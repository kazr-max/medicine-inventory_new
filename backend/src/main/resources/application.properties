# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/medicine}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SQL Init
spring.sql.init.mode=${SQL_INIT_MODE:always}

# Server
server.port=${PORT:8080}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# LINE Messaging API
line.channel-token=${LINE_CHANNEL_TOKEN:}
line.user-id=${LINE_USER_ID:}

# Scheduler
scheduler.secret=${SCHEDULER_SECRET:}
